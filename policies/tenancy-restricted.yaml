# CI mirror of the cluster's tenancy-restricted ClusterPolicy (from
# tenancy-operator). Same rules, but without the namespaceSelector so it
# validates any manifest in a PR, and always Enforce so CI hard-fails even while
# the cluster copy is still rolling out in Audit mode.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: tenancy-restricted
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: require-run-as-nonroot
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: >-
          Tenant workloads must run as non-root: set runAsNonRoot to true at the
          pod level, or on every container.
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: "true"
              =(ephemeralContainers):
                - =(securityContext):
                    =(runAsNonRoot): "true"
              =(initContainers):
                - =(securityContext):
                    =(runAsNonRoot): "true"
              containers:
                - =(securityContext):
                    =(runAsNonRoot): "true"
          - spec:
              =(ephemeralContainers):
                - securityContext:
                    runAsNonRoot: "true"
              =(initContainers):
                - securityContext:
                    runAsNonRoot: "true"
              containers:
                - securityContext:
                    runAsNonRoot: "true"
    - name: disallow-privilege-escalation
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: >-
          Privilege escalation is not allowed: every container must set
          securityContext.allowPrivilegeEscalation to false.
        pattern:
          spec:
            =(ephemeralContainers):
              - securityContext:
                  allowPrivilegeEscalation: "false"
            =(initContainers):
              - securityContext:
                  allowPrivilegeEscalation: "false"
            containers:
              - securityContext:
                  allowPrivilegeEscalation: "false"
    - name: require-drop-all-capabilities
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: >-
          Containers must drop ALL capabilities
          (securityContext.capabilities.drop: [ALL]).
        foreach:
          - list: request.object.spec.[ephemeralContainers, initContainers, containers][]
            deny:
              conditions:
                all:
                  - key: ALL
                    operator: AnyNotIn
                    value: "{{ element.securityContext.capabilities.drop[] || `[]` }}"
    - name: require-seccomp-runtimedefault
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: >-
          Seccomp must be enabled: set securityContext.seccompProfile.type to
          RuntimeDefault (or Localhost) at the pod level, or on every container.
        anyPattern:
          - spec:
              securityContext:
                seccompProfile:
                  type: "RuntimeDefault | Localhost"
              =(ephemeralContainers):
                - =(securityContext):
                    =(seccompProfile):
                      =(type): "RuntimeDefault | Localhost"
              =(initContainers):
                - =(securityContext):
                    =(seccompProfile):
                      =(type): "RuntimeDefault | Localhost"
              containers:
                - =(securityContext):
                    =(seccompProfile):
                      =(type): "RuntimeDefault | Localhost"
          - spec:
              =(ephemeralContainers):
                - securityContext:
                    seccompProfile:
                      type: "RuntimeDefault | Localhost"
              =(initContainers):
                - securityContext:
                    seccompProfile:
                      type: "RuntimeDefault | Localhost"
              containers:
                - securityContext:
                    seccompProfile:
                      type: "RuntimeDefault | Localhost"
    - name: disallow-hostpath
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: "hostPath volumes are not allowed in tenant namespaces."
        pattern:
          spec:
            =(volumes):
              - X(hostPath): "null"
    - name: disallow-hostports
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: "hostPort is not allowed in tenant namespaces."
        pattern:
          spec:
            =(ephemeralContainers):
              - =(ports):
                  - =(hostPort): 0
            =(initContainers):
              - =(ports):
                  - =(hostPort): 0
            containers:
              - =(ports):
                  - =(hostPort): 0
