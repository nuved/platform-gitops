# Generated by nuvedctl for workspace acmecorp-api. Argo CD syncs apps/greeter.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greeter
  labels:
    app: greeter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greeter
  template:
    metadata:
      labels:
        app: greeter
    spec:
      containers:
        - name: greeter
          image: hashicorp/http-echo:1.0
          args: ["-text=greeter service — created via nuvedctl + GitOps", "-listen=:5678"]
          ports:
            - containerPort: 5678
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: greeter
spec:
  selector:
    app: greeter
  ports:
    - port: 80
      targetPort: 5678
