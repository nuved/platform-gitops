# "api" service — deployed by Argo CD from this repo into the acmecorp-api workspace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:1.0
          args: ["-text=api service v1 — deployed by Argo CD from git", "-listen=:5678"]
          ports:
            - containerPort: 5678
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 5678
---
# Deliberate exposure: attaches the api service to the platform's shared
# Gateway (Cilium Gateway API). This is the ONLY way traffic from outside the
# workspace reaches this service — direct cross-namespace access is blocked.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  labels:
    app: api
spec:
  parentRefs:
    - name: nuved
      namespace: platform-ingress
  hostnames:
    - api.acmecorp.demo
  rules:
    - backendRefs:
        - name: api
          port: 80
