# One Argo CD Application per service. Each belongs to its workspace's AppProject
# (which enforces the namespace boundary) and auto-syncs from this repo with
# self-healing (drift is reverted) and pruning (deleted files remove resources).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web
  namespace: argocd
spec:
  project: acmecorp-web
  source:
    repoURL: https://github.com/nuved/platform-gitops.git
    path: apps/web
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: acmecorp-web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api
  namespace: argocd
spec:
  project: acmecorp-api
  source:
    repoURL: https://github.com/nuved/platform-gitops.git
    path: apps/api
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: acmecorp-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
